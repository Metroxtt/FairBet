<div class="topbar">
  <div class="logo">Fair<span>Bet</span></div>
  <nav class="nav-tabs">
    <a href="{% url 'home' %}" class="ntab" style="text-decoration:none">
      <i class="ti ti-layout-dashboard"></i> Inicio
    </a>
    <a href="/events/" class="ntab" style="text-decoration:none">
      <i class="ti ti-calendar-event"></i> Eventos
    </a>
    <a href="/bets/" class="ntab" style="text-decoration:none">
      <i class="ti ti-history"></i> Mis Apuestas
    </a>
    <a href="/wallet/" class="ntab" style="text-decoration:none">
      <i class="ti ti-wallet"></i> Billetera
    </a>
    <a href="{% url 'profile' %}" class="ntab" style="text-decoration:none">
      <i class="ti ti-user"></i> Mi Perfil
    </a>
    {% if user.is_staff %}
    <a href="{% url 'operator-dashboard' %}" class="ntab" style="text-decoration:none; color: var(--neon);">
      <i class="ti ti-shield"></i> Operador
    </a>
    {% endif %}
  </nav>
  <div class="topbar-end">
    <div class="balance-chip" onclick="window.location.href='/wallet/'" style="cursor:pointer">
      <div><div class="lbl">Saldo (S/)</div><div class="val" id="wallet-amount">0.00</div></div>
    </div>
    <form method="POST" action="{% url 'logout' %}" style="margin:0">
      {% csrf_token %}
      <button type="submit" class="notif-btn" title="Cerrar sesión" style="border:1px solid var(--border); background:var(--surface2);">
        <i class="ti ti-logout"></i>
      </button>
    </form>
    <div class="user-btn">
      <div class="u-avatar">{{ user.nombre|make_list|first|upper }}</div>
      <div>
        <div class="u-name">{{ user.nombre }}</div>
        <div class="u-level">Usuario</div>
      </div>
    </div>
  </div>
</div>

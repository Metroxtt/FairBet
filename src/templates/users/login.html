{% extends 'base.html' %}
{% block title %}Iniciar Sesión{% endblock %}

{% block auth_content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
  <div class="card" style="width:400px; padding:40px;">
    <div class="logo-name" style="text-align:center; margin-bottom:32px;">FAIRBET</div>

    {% if error %}
      <div style="color:var(--red); margin-bottom:16px;">{{ error }}</div>
    {% endif %}

    <form id="loginForm" method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" name="email" class="form-input" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-input" required>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%; justify-content:center;">INGRESAR</button>
    </form>
    <p style="text-align:center; margin-top:16px; color:var(--muted);">
      ¿No tienes cuenta? <a href="{% url 'register' %}" style="color:var(--neon);">Regístrate</a>
    </p>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const res = await fetch('/api/token/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: form.email.value,
            password: form.password.value,
        })
    });
    const data = await res.json();
    if (res.ok) {
        localStorage.setItem('access_token', data.access);
        localStorage.setItem('refresh_token', data.refresh);
        // Enviar el formulario al servidor para crear la sesion Django
        form.submit();
    } else {
        alert('Credenciales inválidas. Verifica tu correo y contraseña.');
    }
});
</script>
{% endblock %}
